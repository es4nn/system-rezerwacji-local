@if (isVisible) {
  <aside class="cookie-banner" aria-live="polite" aria-labelledby="cookieBannerTitle">
    <div class="container cookie-banner-inner">
      <p id="cookieBannerTitle" class="mb-0">
        Ta strona wykorzystuje pliki cookies, aby zapewnić najwyższą jakość usług. Korzystając z witryny, zgadzasz się na ich użycie.
      </p>
      <button type="button" class="btn btn-info fw-bold rounded-pill px-4" (click)="acceptCookies()">
        Akceptuję
      </button>
    </div>
  </aside>
}
